# =============================================================================
# Application Configuration
# =============================================================================
# Controls runtime behavior, file paths, and feature toggles.
# Loaded by: modules/app_config.py
#
# Related config files:
#   - model.yaml: LLM provider and model settings
#   - concurrency.yaml: API rate limits, retries, and parallelism
#   - image_processing.yaml: Image preprocessing and text cleaning

# =============================================================================
# Execution Mode
# =============================================================================
# Controls how the application receives input
cli_mode: true  # true = CLI with arguments, false = interactive prompts

# =============================================================================
# Feature Toggles
# =============================================================================
# Enable/disable major processing stages
summarize: true  # false = transcription only (no summarization phase)

# Summary output formats (only applies when summarize=true)
summary_output:
  docx: true      # Generate .docx summary with formatted Word document
  markdown: true  # Generate .md summary for version control and markdown viewers

# =============================================================================
# File Paths
# =============================================================================
# Input: Directory containing PDFs/images to process
# Output: Where to write transcription/summary files
input_folder_path: ''
output_folder_path: ''  # Empty = use input_folder_path as output location
input_paths_is_output_path: true  # true = write outputs next to each input file

# =============================================================================
# Cleanup Settings
# =============================================================================
# Controls temporary file retention after processing
delete_temp_working_dir: true  # Delete extracted images and temp files after completion

# =============================================================================
# Citation Management
# =============================================================================
# OpenAlex API integration for enriching extracted citations with metadata
# (DOI, publication year, authors, venue, hyperlinks in DOCX output)
citation:
  openalex_email: ''  # Required for polite pool (faster responses)
  max_api_requests: 300  # Cap API calls per document to avoid rate limits
  enable_openalex_enrichment: true  # Set to false to disable API calls (faster summary generation)

# =============================================================================
# Daily Token Limit
# =============================================================================
# Budget control to prevent runaway API costs
daily_token_limit:
  enabled: true  # Enforce the daily token budget
  daily_tokens: 30_000_000  # Max tokens per day (resets at midnight)

  # The budget is enforced per page (transcription + optional summary reserved
  # together), not just between files, so a single large document cannot
  # overshoot by a whole file's worth. When the budget is exhausted mid-file,
  # in-flight pages drain, the run waits for the daily reset, then resumes the
  # still-pending pages from the log.

  # Cold-start guess (tokens) for one page before any usage is observed this
  # run; a self-calibrating rolling average (EWMA) takes over after the first
  # pages. Higher is more conservative (stops slightly earlier).
  chunk_estimate_seed: 25_000

  # EWMA smoothing factor (0-1) for the per-call estimate: higher reacts faster
  # to recent calls, lower is steadier.
  estimate_smoothing: 0.3
