# =============================================================================
# Model Configuration -- EXAMPLE / BUNDLED DEFAULTS
# =============================================================================
# This file ships with the repository as a scrubbed template.
# On a fresh clone it is loaded automatically when model.yaml is absent.
#
# To customize: copy this file to model.yaml (same directory) and edit it.
#   cp config/defaults/model.example.yaml config/defaults/model.yaml
#
# LLM settings for transcription and summarization phases.
#
# Related config files:
#   - app.yaml: Application settings and feature toggles
#   - concurrency.yaml: API rate limits, retries, and parallelism
#   - image_processing.yaml: Image preprocessing settings
#
# Supported Providers:
#   openai     - GPT-5.4 (pro/mini/nano), GPT-5.3, GPT-5.2, GPT-5, GPT-4.1, GPT-4o, o-series
#   anthropic  - Claude 4.7, 4.6, 4.5, Claude 4, Claude 3
#   google     - Gemini 3.1, 3, 2.5, 2.0, 1.5
#   openrouter - Multi-provider proxy
#
# Provider Detection:
#   Explicit: "provider:model" format (e.g., "openai:gpt-5-mini")
#   Automatic: Inferred from prefix (gpt- = openai, claude- = anthropic, etc.)

# =============================================================================
# Transcription Model
# =============================================================================
# Used for OCR/image-to-text conversion
transcription_model:
  name: "gpt-5.4-mini"
  provider: "openai"
  max_output_tokens: 128000
  reasoning:
    effort: medium  # none | low | medium | high | xhigh (GPT-5.2+: default is none)
  text:
    verbosity: medium  # low | medium | high
  temperature: 1.0  # 0.0-2.0 (null = provider default; only with reasoning: none)

# =============================================================================
# Summary Model
# =============================================================================
# Used for generating structured summaries from transcriptions
summary_model:
  name: "gpt-5.4-mini"
  provider: "openai"
  max_output_tokens: 128000
  reasoning:
    effort: medium  # none | low | medium | high | xhigh (GPT-5.2+: default is none)
  text:
    verbosity: low  # Lower verbosity for concise summaries
  temperature: 1.0

