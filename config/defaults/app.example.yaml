# =============================================================================
# Application Configuration -- EXAMPLE / BUNDLED DEFAULTS
# =============================================================================
# This file ships with the repository as a scrubbed template.
# On a fresh clone it is loaded automatically when app.yaml is absent.
#
# To customize: copy this file to app.yaml (same directory) and edit it.
#   cp config/defaults/app.example.yaml config/defaults/app.yaml
#
# Controls runtime behavior, file paths, and feature toggles.
#
# Related config files:
#   - model.yaml: LLM provider and model settings
#   - concurrency.yaml: API rate limits, retries, and parallelism
#   - image_processing.yaml: Image preprocessing and text cleaning

# =============================================================================
# Execution Mode
# =============================================================================
# Controls how the application receives input
cli_mode: false  # true = CLI with arguments, false = interactive prompts

# =============================================================================
# Feature Toggles
# =============================================================================
# Enable/disable major processing stages
summarize: true  # false = transcription only (no summarization phase)

# Summary output formats (only applies when summarize=true)
summary_output:
  docx: true      # Generate .docx summary with formatted Word document
  markdown: true  # Generate .md summary for version control and markdown viewers

# =============================================================================
# File Paths
# =============================================================================
# Input: Directory containing PDFs/images to process
# Output: Where to write transcription/summary files
#
# Set these to your local paths, e.g.:
#   input_folder_path: 'C:\path\to\your\PDFs'
#   output_folder_path: ''   # empty = write next to each input file
input_folder_path: ''
output_folder_path: ''  # Empty = use input_folder_path as output location
input_paths_is_output_path: true  # true = write outputs next to each input file

# =============================================================================
# Cleanup Settings
# =============================================================================
# Controls temporary file retention after processing
delete_temp_working_dir: true  # Delete extracted images and temp files after completion

# =============================================================================
# Citation Management
# =============================================================================
# OpenAlex API integration for enriching extracted citations with metadata
# (DOI, publication year, authors, venue, hyperlinks in DOCX output)
citation:
  openalex_email: ''  # Your email for polite pool (faster responses); leave blank to skip
  max_api_requests: 300  # Cap API calls per document to avoid rate limits (every request counts)
  enable_openalex_enrichment: true  # Set to false to disable API calls (faster summary generation)

  # Deduplication tuning. Extracted citations are folded (accents/case/quotes),
  # keyed by (author, year, volume, title), then conservatively merged within a
  # (first-author surname, year) block. Merge only when SequenceMatcher ratio or
  # token-set Jaccard clears its threshold; different years or volumes never
  # merge. Lower the thresholds to merge more aggressively (riskier).
  merge_ratio: 0.90       # SequenceMatcher similarity gate (0-1)
  merge_jaccard: 0.85     # Token-set Jaccard gate (0-1)

  # Strict OpenAlex linking: a candidate links only when title-word overlap
  # clears this AND (publication year within +/-1 of a cited year OR the
  # candidate author surname appears in the citation). Prefer no link over a
  # wrong one.
  match_title_overlap: 0.5

# =============================================================================
# State Directory
# =============================================================================
# Where the daily token-budget state and the persistent OpenAlex cache live.
# Blank = user-level default (~/.autoexcerpter). Set an absolute path to
# override. A legacy state file in the working directory is adopted once when
# the user-level file is absent.
paths:
  state_dir: ''

# =============================================================================
# Daily Token Limit
# =============================================================================
# Budget control to prevent runaway API costs.
# Disabled by default; set enabled: true and adjust daily_tokens to your budget.
daily_token_limit:
  enabled: false  # Set to true to enforce the daily token budget
  daily_tokens: 10_000_000  # Combined secondary guard: max tokens/day across all keys (resets at 00:01 UTC, one minute after the daily provider counter resets at 00:00 UTC)

  # Combined-guard scope. "pooled" (default) enforces daily_tokens only against
  # buckets that belong to a daily-allowance pool (plus legacy un-stamped
  # usage), so one pooled key hitting its cap never blocks endpoints outside
  # any pool; "all" enforces daily_tokens against every stamped key too.
  scope: pooled

  # Per-key daily pools (PRIMARY enforcement). Some providers grant each API
  # key a daily token allowance shared across a set of models (a "pool").
  # Usage is tracked per key-env-var NAME (e.g. OPENAI_API_KEY vs an
  # OPENAI_API_KEY_2 remapped via api_keys.yaml), so different keys never
  # share a cap.
  #
  # Built-in defaults mirror OpenAI's complimentary daily token program (a
  # "large" and a "small" pool over the eligible model families) with caps
  # slightly below the published allowances for safety headroom; adjust them
  # to your own account terms, or define your own pools for any provider.
  # Each pool entry is EITHER a bare integer (cap only; model list from the
  # built-ins) OR a mapping with optional keys:
  #   cap:    daily token cap for this pool, per key (omit = tracked, uncapped)
  #   models: model-name prefixes belonging to this pool (longest prefix wins;
  #           configured lists REPLACE the built-ins for that provider)
  # Models matching no pool derive no pool and are never blocked by this gate.
  # Absent block -> built-in defaults apply; enabled: false turns the per-key
  # gate off, leaving only the combined daily_tokens guard.
  per_key_pool_caps:
    enabled: true
    openai:
      small: 9_750_000  # built-in mini/nano-family pool, per key
      large: 975_000    # built-in frontier-family pool, per key
    # Example of a custom pool for another provider or endpoint:
    # myprovider:
    #   standard:
    #     cap: 5_000_000
    #     models: ["my-model", "my-model-lite"]

  # The budget is enforced per page (transcription + optional summary reserved
  # together), not just between files, so a single large document cannot
  # overshoot by a whole file's worth. When the budget is exhausted mid-file,
  # in-flight pages drain, the run waits for the daily reset, then resumes the
  # still-pending pages from the log.

  # Cold-start guess (tokens) for one page before any usage is observed this
  # run; a self-calibrating rolling average (EWMA) takes over after the first
  # pages. Higher is more conservative (stops slightly earlier).
  chunk_estimate_seed: 25_000

  # EWMA smoothing factor (0-1) for the rolling per-page estimate: higher reacts
  # faster to recent pages, lower is steadier. The estimate observes each page's
  # total usage (transcription + optional summary + retries) as one sample, so
  # the reservation gate reserves per-page cost rather than per-call cost.
  estimate_smoothing: 0.3

# =============================================================================
# Shared Cross-Tool Token Budget (opt-in)
# =============================================================================
# Off by default. When enabled, the daily_token_limit.daily_tokens cap above is
# enforced against the COMBINED daily usage of every participating
# ChronoPipeline tool (ChronoMiner, ChronoTranscriber, AutoExcerpter) rather
# than this tool's usage alone. The tools coordinate through one shared on-disk
# ledger guarded by an OS file lock, so several tools running at once cannot
# collectively overshoot the single combined budget.
#
# While enabled the shared ledger REPLACES this tool's private token-state file
# as the daily-usage record; per-tool daily_tokens is enforced against the
# combined total. When disabled (default) behaviour is bit-for-bit the private
# per-tool tracker with zero ledger I/O.
shared_token_budget:
  enabled: false  # true = share one combined daily budget across the tools
  ledger_dir: ''  # Empty = ~/.chronopipeline/token_ledger.json; or an absolute path
